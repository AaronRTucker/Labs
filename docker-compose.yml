services:
  web:
    build: .
    command: >
      sh -c "npm run dev"
    ports:
      - "8083:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - default
      - scs_main
    restart: unless-stopped

volumes:
  node_modules:

networks:
  default:
  scs_main:
    external: true
    name: southwest-cinema-services_default
